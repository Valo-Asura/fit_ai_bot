version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: fit_ai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
    container_name: fit_ai_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/fit_ai
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: fit_ai_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
